  spring:
    application:
      name: aicodereview

    profiles:
      active: ${APP_PROFILE:dev}

    datasource:
      url: ${DB_URL:jdbc:mysql://localhost:3306/aicodereview?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&characterEncoding=UTF-8}
      username: ${DB_USERNAME:root}
      password: ${DB_PASSWORD:Anwar@12345$}
      driver-class-name: com.mysql.cj.jdbc.Driver

    jpa:
      hibernate:
        ddl-auto: validate
      properties:
        hibernate:
          dialect: org.hibernate.dialect.MySQL8Dialect
          format_sql: true
          transaction:
            coordinator_class: jdbc

    flyway:
      enabled: true
      baseline-on-migrate: true
      locations: classpath:db/migration

    cache:
      type: simple

    servlet:
      multipart:
        max-file-size: ${UPLOAD_MAX_FILE_SIZE:10MB}
        max-request-size: ${UPLOAD_MAX_FILE_SIZE:10MB}

  server:
    port: ${SERVER_PORT:9095}

  jwt:
    secret: ${JWT_SECRET:change-me-in-production}
    expiration-ms: ${JWT_EXPIRATION_MS:3600000}
    refresh-expiration-ms: ${JWT_REFRESH_EXPIRATION_MS:604800000}

  ai:
    provider: ${AI_PROVIDER:gemini}
    gemini:
      api-key: ${GOOGLE_API_KEY:}
      endpoint: ${GEMINI_ENDPOINT:https://generativelanguage.googleapis.com/v1beta/models/gemini-flash-latest:generateContent}

  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:3000,http://localhost:8080,http://localhost:9095}

  management:
    endpoints:
      web:
        exposure:
          include: health,info,metrics,prometheus

    endpoint:
      health:
        probes:
          enabled: true

    metrics:
      export:
        prometheus:
          enabled: true

  logging:
    level:
      root: INFO
      com.anwar.aicodereview: INFO
      org.hibernate.SQL: DEBUG
      org.hibernate.type.descriptor.sql.BasicBinder: TRACE

    pattern:
      console: "%d{yyyy-MM-dd HH:mm:ss} [%thread] [%X{requestId:-no-request-id}] %-5level %logger{36} - %msg%n"

