version: '3.9'
services:
  app:
    build: .
    ports:
      - "9095:9095"
    environment:
      APP_PROFILE: dev
      DB_URL: jdbc:mysql://db:3306/aicodereview?useSSL=false&serverTimezone=UTC
      DB_USERNAME: root
      DB_PASSWORD: root
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
    depends_on:
      - db
  db:
    image: mysql:8.0
    environment:
      MYSQL_DATABASE: aicodereview
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql-data:/var/lib/mysql
volumes:
  mysql-data:
