name: CI/CD

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
      - name: Build and test
        run: ./backend/mvnw -q -Dspring.profiles.active=test test
      - name: Package
        run: ./backend/mvnw -q -DskipTests package
